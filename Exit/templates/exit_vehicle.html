<!DOCTYPE html>
<html>
<head>
    <title>Phoenix Mall - Exit Parking</title>
    <style>
        :root {
            --primary-blue: #1565c0;
            --secondary-blue: #0d47a1;
            --light-blue: #e3f2fd;
            --accent-blue: #64b5f6;
        }
        
        body {
            background-color: var(--light-blue);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            width: 90%;
            max-width: 500px;
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        h2 {
            color: var(--secondary-blue);
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #555;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        
        input[type="text"]:focus {
            border-color: var(--accent-blue);
            outline: none;
            box-shadow: 0 0 0 3px rgba(100, 181, 246, 0.2);
        }
        
        button {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: var(--secondary-blue);
        }
        
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
        
        .icon {
            font-size: 40px;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }
        
        .mall-name {
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🅿️</div>
            <div class="mall-name">PHOENIX MALL</div>
            <h2>Exit Parking</h2>
            <div class="subtitle">Please enter your credentials to proceed to payment</div>
        </div>
        
        <div class="card">
            <form action="/process_exit" method="post">
                <div class="form-group">
                    <label for="user_id">User ID</label>
                    <input type="text" id="user_id" name="user_id" placeholder="Enter your user ID" required>
                </div>
                
                <button type="submit">Check Parking Charges</button>
            </form>
        </div>
        
        <div class="footer">
            Thank you for shopping at Phoenix Mall
        </div>
    </div>
</body>
</html>
