<!DOCTYPE html>
<html>
<head>
    <title>Phoenix Mall - Payment</title>
    <style>
        :root {
            --primary-blue: #1565c0;
            --secondary-blue: #0d47a1;
            --light-blue: #e3f2fd;
            --accent-blue: #64b5f6;
            --success-green: #4caf50;
        }
        
        body {
            background-color: var(--light-blue);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            width: 90%;
            max-width: 500px;
        }
        
        .payment-card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }
        
        .mall-name {
            color: var(--primary-blue);
            font-weight: 700;
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        h2 {
            color: var(--secondary-blue);
            font-size: 22px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .payment-details {
            margin-bottom: 25px;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .detail-label {
            color: #666;
            font-weight: 500;
        }
        
        .detail-value {
            font-weight: 600;
        }
        
        .total-row {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid var(--accent-blue);
            font-size: 18px;
        }
        
        .total-value {
            color: var(--secondary-blue);
            font-weight: 700;
            font-size: 22px;
        }
        
        .payment-button {
            background-color: var(--success-green);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 25px;
        }
        
        .payment-button:hover {
            background-color: #3d8b40;
        }
        
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #666;
            text-align: center;
        }
        
        .slot-info {
            background-color: var(--light-blue);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        
        .charges-breakdown {
            background-color: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mall-name">PHOENIX MALL</div>
        
        <div class="payment-card">
            <h2>Parking Payment Summary</h2>
            
            <div class="slot-info">
                Your vehicle is parked at: <strong>{{ slot_allocated }}</strong>
            </div>
            
            <div class="payment-details">
                <div class="detail-row">
                    <span class="detail-label">User ID:</span>
                    <span class="detail-value">{{ user_id }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Vehicle Type:</span>
                    <span class="detail-value">{{ vehicle_type }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Entry Time:</span>
                    <span class="detail-value">{{ entry_time }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Exit Time:</span>
                    <span class="detail-value">{{ exit_time }}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Duration:</span>
                    <span class="detail-value">{{ duration }}</span>
                </div>
                
                <div class="total-row">
                    <span class="detail-label">Total Charges:</span>
                    <span class="total-value">₹{{ total_charge }}</span>
                </div>
            </div>
            
            <form action="/complete_exit" method="post">
                <input type="hidden" name="user_id" value="{{ user_id }}">
                <input type="hidden" name="total_charge" value="{{ total_charge }}">
                <button type="submit" class="payment-button">Confirm Payment & Exit</button>
            </form>
        </div>
        
        <div class="footer">
            Thank you for visiting Phoenix Mall
        </div>
    </div>
</body>
</html>
